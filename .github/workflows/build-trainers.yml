name: Build Trainers

on:
  push:
    branches: [main]
    paths:
      - 'registry.json'
      - '**/CMakeLists.txt'
      - '**/*.cpp'
      - '**/*.h'
      - 'include/**'
  workflow_dispatch:
    inputs:
      game:
        description: 'Game to build (game_name from registry.json, or "all")'
        required: true
        default: 'all'
        type: string

permissions:
  contents: write

jobs:
  # ── 1. Read registry.json and emit the list of games ─────────────────────────
  load-registry:
    runs-on: ubuntu-latest
    outputs:
      games: ${{ steps.parse.outputs.games }}
      paths: ${{ steps.parse.outputs.paths }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse registry.json
        id: parse
        shell: python3 {0}
        run: |
          import json, os

          with open("registry.json") as f:
              reg = json.load(f)

          trainers = reg["trainers"]

          # Matrix items: [{ "game": "Balatro" }, ...]
          games = [{"game": t["game_name"]} for t in trainers]

          # paths-filter YAML block  (one key per game)
          paths_lines = []
          for t in trainers:
              name = t["game_name"]
              key  = name.lower()
              paths_lines.append(f"{key}:")
              paths_lines.append(f"  - '{name}/**'")
              paths_lines.append(f"  - 'include/**'")
          paths_yaml = "\n".join(paths_lines)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"games={json.dumps(games)}\n")
              # use a heredoc-style multiline output
              out.write("paths<<PATHS_EOF\n")
              out.write(paths_yaml + "\n")
              out.write("PATHS_EOF\n")

  # ── 2. Detect which game folders actually changed ─────────────────────────────
  detect-changes:
    needs: load-registry
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: none
          filters: ${{ needs.load-registry.outputs.paths }}

  # ── 3. Build each trainer ─────────────────────────────────────────────────────
  build:
    needs: [load-registry, detect-changes]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-registry.outputs.games) }}

    steps:
      - name: Determine if build needed
        id: check
        shell: bash
        run: |
          GAME="${{ matrix.game }}"
          KEY="${GAME,,}"   # lowercase

          CHANGED='${{ needs.detect-changes.outputs.changed }}'
          INPUT_GAME="${{ github.event.inputs.game }}"
          EVENT="${{ github.event_name }}"

          echo "changed list : $CHANGED"
          echo "input.game   : $INPUT_GAME"
          echo "event        : $EVENT"

          # Check whether this game's key appears in the JSON array of changed filters
          if python3 -c "
          import json, sys
          changed = json.loads(sys.argv[1])
          key     = sys.argv[2]
          sys.exit(0 if key in changed else 1)
          " "$CHANGED" "$KEY"; then
            CHANGED_FOR_GAME=true
          else
            CHANGED_FOR_GAME=false
          fi

          if [[ "$EVENT" == "push" && "$CHANGED_FOR_GAME" == "true" ]] \
          || [[ "$EVENT" == "workflow_dispatch" && ( "$INPUT_GAME" == "$GAME" || "$INPUT_GAME" == "all" ) ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "Skipping $GAME — no relevant changes."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Setup MSVC x64
        if: steps.check.outputs.skip != 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        if: steps.check.outputs.skip != 'true'
        run: choco install ninja -y

      - name: Configure CMake
        if: steps.check.outputs.skip != 'true'
        run: cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release
        working-directory: ${{ matrix.game }}

      - name: Build DLL
        if: steps.check.outputs.skip != 'true'
        run: cmake --build build --config Release
        working-directory: ${{ matrix.game }}

      - name: Read versions.json
        id: ver
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        working-directory: ${{ matrix.game }}
        run: |
          $v = Get-Content "versions.json" | ConvertFrom-Json
          "game_id=$($v.game_id)"                 >> $env:GITHUB_OUTPUT
          "game_version=$($v.game_version)"       >> $env:GITHUB_OUTPUT
          "trainer_version=$($v.trainer_version)" >> $env:GITHUB_OUTPUT

      - name: Compute SHA256
        id: hash
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.game }}/build/trainer.dll" -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      - name: Save SHA256 artifact
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: printf '%s' '${{ steps.hash.outputs.sha256 }}' > '${{ matrix.game }}.sha256'

      - name: Upload SHA256 artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.game }}
          path: ${{ matrix.game }}.sha256
          retention-days: 1

      - name: Generate metadata.json
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $meta = [ordered]@{
            game_id         = "${{ steps.ver.outputs.game_id }}"
            game_name       = "${{ matrix.game }}"
            game_version    = "${{ steps.ver.outputs.game_version }}"
            trainer_version = "${{ steps.ver.outputs.trainer_version }}"
            dll_filename    = "trainer.dll"
            sha256          = "${{ steps.hash.outputs.sha256 }}"
            build_date      = (Get-Date -Format "yyyy-MM-dd")
            build_run_id    = "${{ github.run_id }}"
          }
          $meta | ConvertTo-Json -Depth 2 | Out-File "${{ matrix.game }}/build/metadata.json" -Encoding utf8NoBOM

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ matrix.game }}-${{ steps.ver.outputs.game_version }}-${{ steps.ver.outputs.trainer_version }}"
          name: "${{ matrix.game }} v${{ steps.ver.outputs.game_version }} (Trainer v${{ steps.ver.outputs.trainer_version }})"
          body: |
            ### ${{ matrix.game }} Trainer v${{ steps.ver.outputs.trainer_version }}

            **Game version:** ${{ steps.ver.outputs.game_version }}
            **Game ID:** ${{ steps.ver.outputs.game_id }}
            **SHA256:** `${{ steps.hash.outputs.sha256 }}`
            **Built:** Run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            ${{ matrix.game }}/build/trainer.dll
            ${{ matrix.game }}/build/metadata.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Patch registry.json with the real SHA256 hashes ───────────────────────
  update-registry:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SHA256 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true
          path: sha256s/
        continue-on-error: true

      - name: Patch per-game registry.json files with real SHA256 hashes
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, sys

          sha_files = glob.glob("sha256s/*.sha256")
          if not sha_files:
              print("No SHA256 artifacts found — nothing to patch.")
              sys.exit(0)

          patched = []
          for sha_file in sha_files:
              game_dir = os.path.basename(sha_file).replace(".sha256", "")

              versions_file = f"{game_dir}/versions.json"
              if not os.path.exists(versions_file):
                  print(f"Warning: {versions_file} not found, skipping {game_dir}")
                  continue

              per_game_registry = f"{game_dir}/registry.json"
              if not os.path.exists(per_game_registry):
                  print(f"Warning: {per_game_registry} not found, skipping {game_dir}")
                  continue

              with open(versions_file) as f:
                  v = json.load(f)
              with open(sha_file) as f:
                  sha256 = f.read().strip()

              if not sha256 or len(sha256) != 64:
                  print(f"Warning: invalid sha256 for {game_dir}: '{sha256}'")
                  continue

              # Per-game registry.json is a flat object — just update sha256 in place
              with open(per_game_registry) as f:
                  reg = json.load(f)

              reg["sha256"]          = sha256
              reg["trainer_version"] = v["trainer_version"]
              reg["release_tag"]     = f"{v['game_name']}-{v['game_version']}-{v['trainer_version']}"

              with open(per_game_registry, "w") as f:
                  json.dump(reg, f, indent=2, ensure_ascii=False)
                  f.write("\n")

              patched.append(game_dir)
              print(f"Patched {game_dir}: {sha256[:16]}...")

          print(f"Done. Patched: {patched or 'nothing'}")
          PYEOF

      - name: Commit updated per-game registry.json files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*/registry.json'
          if git diff --cached --quiet; then
            echo "No per-game registry.json files changed — nothing to commit."
          else
            git commit -m "ci: update per-game registry.json sha256 hashes [skip ci]"
            git push
          fi
