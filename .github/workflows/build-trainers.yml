name: Build Trainers

on:
  push:
    branches: [main]
    paths:
      - 'Balatro/**'
      - 'Cyberpunk2077/**'
      - 'StardewValley/**'
      - 'include/**'
  workflow_dispatch:
    inputs:
      game:
        description: 'Game to build'
        required: true
        default: 'all'
        type: choice
        options: [all, Balatro, Cyberpunk2077, StardewValley]

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      balatro:   ${{ steps.filter.outputs.balatro }}
      cyberpunk: ${{ steps.filter.outputs.cyberpunk }}
      stardew:   ${{ steps.filter.outputs.stardew }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            balatro:
              - 'Balatro/**'
              - 'include/**'
            cyberpunk:
              - 'Cyberpunk2077/**'
              - 'include/**'
            stardew:
              - 'StardewValley/**'
              - 'include/**'

  build:
    needs: detect-changes
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - game: Balatro
            should_build: ${{ needs.detect-changes.outputs.balatro == 'true' || github.event.inputs.game == 'Balatro' || github.event.inputs.game == 'all' }}
          - game: Cyberpunk2077
            should_build: ${{ needs.detect-changes.outputs.cyberpunk == 'true' || github.event.inputs.game == 'Cyberpunk2077' || github.event.inputs.game == 'all' }}
          - game: StardewValley
            should_build: ${{ needs.detect-changes.outputs.stardew == 'true' || github.event.inputs.game == 'StardewValley' || github.event.inputs.game == 'all' }}

    steps:
      - name: Determine if build needed
        id: check
        shell: bash
        run: |
          if [ "${{ matrix.should_build }}" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.game }} — no relevant changes."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Setup MSVC x64
        if: steps.check.outputs.skip != 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        if: steps.check.outputs.skip != 'true'
        run: choco install ninja -y

      - name: Configure CMake
        if: steps.check.outputs.skip != 'true'
        run: cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release
        working-directory: ${{ matrix.game }}

      - name: Build DLL
        if: steps.check.outputs.skip != 'true'
        run: cmake --build build --config Release
        working-directory: ${{ matrix.game }}

      - name: Read versions.json
        id: ver
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        working-directory: ${{ matrix.game }}
        run: |
          $v = Get-Content "versions.json" | ConvertFrom-Json
          "game_id=$($v.game_id)"               >> $env:GITHUB_OUTPUT
          "game_version=$($v.game_version)"     >> $env:GITHUB_OUTPUT
          "trainer_version=$($v.trainer_version)" >> $env:GITHUB_OUTPUT

      - name: Compute SHA256
        id: hash
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.game }}/build/trainer.dll" -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      # Save hash to a named file so update-registry can identify which game it belongs to
      - name: Save SHA256 artifact
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: printf '%s' '${{ steps.hash.outputs.sha256 }}' > '${{ matrix.game }}.sha256'

      - name: Upload SHA256 artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.game }}
          path: ${{ matrix.game }}.sha256
          retention-days: 1

      - name: Generate metadata.json
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $meta = [ordered]@{
            game_id         = "${{ steps.ver.outputs.game_id }}"
            game_name       = "${{ matrix.game }}"
            game_version    = "${{ steps.ver.outputs.game_version }}"
            trainer_version = "${{ steps.ver.outputs.trainer_version }}"
            dll_filename    = "trainer.dll"
            sha256          = "${{ steps.hash.outputs.sha256 }}"
            build_date      = (Get-Date -Format "yyyy-MM-dd")
            build_run_id    = "${{ github.run_id }}"
          }
          $meta | ConvertTo-Json -Depth 2 | Out-File "${{ matrix.game }}/build/metadata.json" -Encoding utf8NoBOM

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ matrix.game }}-${{ steps.ver.outputs.game_version }}-${{ steps.ver.outputs.trainer_version }}"
          name: "${{ matrix.game }} v${{ steps.ver.outputs.game_version }} (Trainer v${{ steps.ver.outputs.trainer_version }})"
          body: |
            ### ${{ matrix.game }} Trainer v${{ steps.ver.outputs.trainer_version }}

            **Game version:** ${{ steps.ver.outputs.game_version }}
            **Game ID:** ${{ steps.ver.outputs.game_id }}
            **SHA256:** `${{ steps.hash.outputs.sha256 }}`
            **Built:** Run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          files: |
            ${{ matrix.game }}/build/trainer.dll
            ${{ matrix.game }}/build/metadata.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-registry:
    needs: build
    runs-on: ubuntu-latest
    # Run whenever build finishes (even if some matrix jobs were skipped),
    # but not if the workflow itself was cancelled.
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Download all sha256-* artifacts into sha256s/ directory.
      # If no builds ran (all skipped), this produces an empty directory and the
      # Python script below exits cleanly with nothing to patch.
      - name: Download SHA256 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true
          path: sha256s/
        continue-on-error: true  # no artifacts uploaded if all games were skipped

      - name: Patch registry.json with real SHA256 hashes
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, sys

          sha_files = glob.glob("sha256s/*.sha256")
          if not sha_files:
              print("No SHA256 artifacts found — nothing to patch.")
              sys.exit(0)

          with open("registry.json") as f:
              reg = json.load(f)

          patched = []
          for sha_file in sha_files:
              game_dir = os.path.basename(sha_file).replace(".sha256", "")
              versions_file = f"{game_dir}/versions.json"
              if not os.path.exists(versions_file):
                  print(f"Warning: {versions_file} not found, skipping {game_dir}")
                  continue

              with open(versions_file) as f:
                  v = json.load(f)
              with open(sha_file) as f:
                  sha256 = f.read().strip()

              if not sha256 or len(sha256) != 64:
                  print(f"Warning: invalid sha256 for {game_dir}: '{sha256}'")
                  continue

              trainer_version = v["trainer_version"]
              release_tag     = f"{v['game_name']}-{v['game_version']}-{trainer_version}"
              repo            = os.environ.get("GITHUB_REPOSITORY", "funneco/UsMod-dlls")

              updated = False
              for trainer in reg["trainers"]:
                  if trainer["game_id"] != v["game_id"]:
                      continue
                  # Update existing entry for this trainer_version
                  for entry in trainer["entries"]:
                      if entry["trainer_version"] == trainer_version:
                          entry["sha256"] = sha256
                          updated = True
                          break
                  # No matching entry yet — prepend a new one
                  if not updated:
                      trainer["entries"].insert(0, {
                          "trainer_version":    trainer_version,
                          "release_tag":        release_tag,
                          "repo":               repo,
                          "dll_filename":       "trainer.dll",
                          "sha256":             sha256,
                          "version_constraint": v["version_constraint"],
                      })
                      updated = True
                  break

              if updated:
                  patched.append(game_dir)
                  print(f"Patched {game_dir}: {sha256[:16]}...")
              else:
                  print(f"Warning: no registry entry found for game_id={v['game_id']} ({game_dir})")

          with open("registry.json", "w") as f:
              json.dump(reg, f, indent=2)
              f.write("\n")

          print(f"Done. Patched: {patched or 'nothing'}")
          PYEOF

      - name: Commit updated registry.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json
          if git diff --cached --quiet; then
            echo "registry.json unchanged — nothing to commit."
          else
            git commit -m "ci: update registry.json sha256 hashes [skip ci]"
            git push
          fi
